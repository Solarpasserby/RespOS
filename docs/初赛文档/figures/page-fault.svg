<svg xmlns="http://www.w3.org/2000/svg" width="920" height="500" viewBox="0 0 920 500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475467"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 10; }
      .entry { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.7; rx: 10; }
      .cow { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.7; rx: 10; }
      .lazy { fill: #ecfdf3; stroke: #16a34a; stroke-width: 1.7; rx: 10; }
      .fail { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.6; rx: 10; }
      .done { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; rx: 10; }
      .label { font: 700 22px sans-serif; fill: #202124; }
      .small { font: 500 17px monospace; fill: #344054; }
      .hint { font: 500 16px sans-serif; fill: #667085; }
      .arrow { stroke: #475467; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #667085; stroke-width: 1.8; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="305" y="28" width="310" height="66" class="entry"/>
  <text x="460" y="56" text-anchor="middle" class="label">用户态缺页</text>
  <text x="460" y="81" text-anchor="middle" class="small">PageFaultCause + fault address</text>

  <line x1="460" y1="94" x2="460" y2="134" class="arrow"/>

  <rect x="285" y="134" width="350" height="70" class="box"/>
  <text x="460" y="163" text-anchor="middle" class="label">查找 MapArea 与权限</text>
  <text x="460" y="188" text-anchor="middle" class="small">USER + READ/WRITE/EXECUTE</text>

  <path d="M285 170 C180 170 134 220 132 276" class="dash"/>
  <text x="190" y="214" class="hint">无区域或权限不符</text>

  <rect x="54" y="276" width="210" height="64" class="fail"/>
  <text x="159" y="304" text-anchor="middle" class="label">修复失败</text>
  <text x="159" y="329" text-anchor="middle" class="small">EFAULT / SIGSEGV</text>

  <line x1="460" y1="204" x2="460" y2="242" class="arrow"/>

  <rect x="278" y="242" width="364" height="70" class="box"/>
  <text x="460" y="271" text-anchor="middle" class="label">检查页表项</text>
  <text x="460" y="296" text-anchor="middle" class="small">valid? cow? writable?</text>

  <path d="M415 312 C325 338 265 355 210 388" class="arrow"/>
  <text x="290" y="351" class="hint">PTE 无效</text>

  <rect x="74" y="388" width="250" height="70" class="lazy"/>
  <text x="199" y="417" text-anchor="middle" class="label">懒分配</text>
  <text x="199" y="442" text-anchor="middle" class="small">map_one + frame_alloc</text>

  <path d="M505 312 C605 338 675 355 727 388" class="arrow"/>
  <text x="650" y="351" class="hint">store + COW</text>

  <rect x="596" y="388" width="250" height="70" class="cow"/>
  <text x="721" y="417" text-anchor="middle" class="label">写时复制</text>
  <text x="721" y="442" text-anchor="middle" class="small">clear COW or copy frame</text>

  <line x1="460" y1="312" x2="460" y2="388" class="dash"/>
  <rect x="356" y="388" width="208" height="70" class="fail"/>
  <text x="460" y="417" text-anchor="middle" class="label">其他异常</text>
  <text x="460" y="442" text-anchor="middle" class="small">permission / mapped fault</text>

  <path d="M324 423 C382 477 537 477 596 423" class="dash"/>
  <text x="460" y="486" text-anchor="middle" class="small">flush_tlb 后返回 trap_handler</text>
</svg>
