<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420">
  <defs>
    <style>
      .title{font:700 22px sans-serif;fill:#202124}
      .label{font:600 16px sans-serif;fill:#202124}
      .small{font:13px sans-serif;fill:#475467}
      .mono{font:13px monospace;fill:#344054}
      .box{fill:#f8fafc;stroke:#98a2b3;stroke-width:1.2;rx:8}
      .arch{fill:#fff7ed;stroke:#f97316;stroke-width:1.3;rx:8}
      .shared{fill:#eef4ff;stroke:#6172f3;stroke-width:1.3;rx:8}
      .arrow{stroke:#667085;stroke-width:1.8;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#667085"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="920" height="420" fill="#ffffff"/>
  <text x="460" y="34" text-anchor="middle" class="title">RespOS 硬件抽象层组织</text>

  <rect x="65" y="72" width="790" height="70" class="box"/>
  <text x="460" y="101" text-anchor="middle" class="label">上层内核子系统</text>
  <text x="460" y="124" text-anchor="middle" class="small">task / syscall / fs / net / drivers / mm</text>

  <rect x="135" y="180" width="650" height="68" class="shared"/>
  <text x="460" y="209" text-anchor="middle" class="label">统一导出层：os/src/arch/mod.rs</text>
  <text x="460" y="232" text-anchor="middle" class="mono">pub use rv64::*;  |  pub use loongarch64::*;</text>

  <rect x="70" y="292" width="360" height="86" class="arch"/>
  <text x="250" y="323" text-anchor="middle" class="label">RISC-V 64</text>
  <text x="250" y="348" text-anchor="middle" class="small">satp / sfence.vma / SBI / Sv39</text>
  <text x="250" y="369" text-anchor="middle" class="mono">entry, trap, timer, task, mm, config</text>

  <rect x="490" y="292" width="360" height="86" class="arch"/>
  <text x="670" y="323" text-anchor="middle" class="label">LoongArch 64</text>
  <text x="670" y="348" text-anchor="middle" class="small">PGDL/PGDH / TLB refill / UART / PCI</text>
  <text x="670" y="369" text-anchor="middle" class="mono">entry, trap, timer, task, mm, register</text>

  <path d="M460 142 L460 180" class="arrow"/>
  <path d="M380 248 C330 268 285 272 250 292" class="arrow"/>
  <path d="M540 248 C590 268 635 272 670 292" class="arrow"/>
</svg>
