<svg xmlns="http://www.w3.org/2000/svg" width="900" height="510" viewBox="40 80 900 510">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475467"/>
    </marker>
    <style>
      .title { font: 700 28px sans-serif; fill: #202124; }
      .sub { font: 500 18px sans-serif; fill: #475467; }
      .small { font: 500 21px monospace; fill: #344054; }
      .box-title { font: 700 24px sans-serif; fill: #202124; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 10; }
      .kernel { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.6; rx: 12; }
      .sys { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.6; rx: 10; }
      .hw { fill: #f0fdf4; stroke: #15803d; stroke-width: 1.6; rx: 10; }
      .arrow { stroke: #475467; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #667085; stroke-width: 1.6; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="70" y="88" width="840" height="72" class="sys"/>
  <text x="490" y="118" text-anchor="middle" class="box-title">用户态程序与测试负载</text>
  <text x="490" y="145" text-anchor="middle" class="small">busybox / libc / LTP / 自定义用户程序</text>

  <line x1="490" y1="160" x2="490" y2="206" class="arrow"/>
  <text x="510" y="190" class="small">syscall / trap / interrupt</text>

  <rect x="250" y="206" width="480" height="64" class="box"/>
  <text x="490" y="232" text-anchor="middle" class="box-title">系统调用与异常入口</text>
  <text x="490" y="256" text-anchor="middle" class="small">syscall dispatcher / trap handler / errno / ABI structs</text>

  <line x1="490" y1="270" x2="490" y2="316" class="arrow"/>

  <rect x="70" y="316" width="840" height="154" class="kernel"/>
  <text x="490" y="346" text-anchor="middle" class="box-title">内核核心服务</text>

  <rect x="105" y="370" width="120" height="58" class="box"/>
  <text x="165" y="394" text-anchor="middle" class="box-title">task</text>
  <text x="165" y="416" text-anchor="middle" class="small">调度/进程</text>

  <rect x="245" y="370" width="120" height="58" class="box"/>
  <text x="305" y="394" text-anchor="middle" class="box-title">mm</text>
  <text x="305" y="416" text-anchor="middle" class="small">地址空间</text>

  <rect x="385" y="370" width="120" height="58" class="box"/>
  <text x="445" y="394" text-anchor="middle" class="box-title">fs</text>
  <text x="445" y="416" text-anchor="middle" class="small">VFS/Ext4</text>

  <rect x="525" y="370" width="120" height="58" class="box"/>
  <text x="585" y="394" text-anchor="middle" class="box-title">signal/ipc</text>
  <text x="585" y="416" text-anchor="middle" class="small">信号/同步</text>

  <rect x="665" y="370" width="120" height="58" class="box"/>
  <text x="725" y="394" text-anchor="middle" class="box-title">net/time</text>
  <text x="725" y="416" text-anchor="middle" class="small">网络/时钟</text>

  <line x1="225" y1="399" x2="245" y2="399" class="dash"/>
  <line x1="365" y1="399" x2="385" y2="399" class="dash"/>
  <line x1="505" y1="399" x2="525" y2="399" class="dash"/>
  <line x1="645" y1="399" x2="665" y2="399" class="dash"/>

  <line x1="490" y1="470" x2="490" y2="512" class="arrow"/>

  <rect x="120" y="512" width="330" height="66" class="hw"/>
  <text x="285" y="538" text-anchor="middle" class="box-title">硬件抽象与设备</text>
  <text x="285" y="562" text-anchor="middle" class="small">arch::rv64 / arch::loongarch64 / timer / VirtIO block</text>

  <rect x="530" y="512" width="330" height="66" class="hw"/>
  <text x="695" y="538" text-anchor="middle" class="box-title">QEMU 虚拟硬件</text>
  <text x="695" y="562" text-anchor="middle" class="small">virt machine / block image / serial console</text>

  <line x1="450" y1="545" x2="530" y2="545" class="arrow"/>
</svg>
