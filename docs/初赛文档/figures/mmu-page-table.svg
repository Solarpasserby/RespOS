<svg xmlns="http://www.w3.org/2000/svg" width="920" height="500" viewBox="0 0 920 500">
  <defs>
    <style>
      .title{font:700 22px sans-serif;fill:#202124}
      .head{font:700 16px sans-serif;fill:#202124}
      .text{font:14px sans-serif;fill:#344054}
      .mono{font:13px monospace;fill:#344054}
      .box{fill:#f8fafc;stroke:#98a2b3;stroke-width:1.2;rx:8}
      .rv{fill:#eef4ff;stroke:#6172f3;stroke-width:1.3;rx:8}
      .la{fill:#fff7ed;stroke:#f97316;stroke-width:1.3;rx:8}
      .warn{fill:#fff1f3;stroke:#f63d68;stroke-width:1.2;rx:8}
      .arrow{stroke:#667085;stroke-width:1.8;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#667085"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="920" height="500" fill="#ffffff"/>
  <text x="460" y="34" text-anchor="middle" class="title">统一 MemorySet 与架构页表后端</text>

  <rect x="285" y="70" width="350" height="62" class="box"/>
  <text x="460" y="97" text-anchor="middle" class="head">MemorySet / MapArea</text>
  <text x="460" y="119" text-anchor="middle" class="text">内核段、用户 ELF、mmap、lazy fault、COW</text>

  <rect x="285" y="165" width="350" height="62" class="box"/>
  <text x="460" y="192" text-anchor="middle" class="head">PageTable 统一接口</text>
  <text x="460" y="214" text-anchor="middle" class="mono">new / from_kernel / token / map / unmap / translate</text>

  <rect x="65" y="270" width="360" height="105" class="rv"/>
  <text x="245" y="299" text-anchor="middle" class="head">RISC-V Sv39</text>
  <text x="245" y="323" text-anchor="middle" class="mono">token = MODE(8) | root_ppn</text>
  <text x="245" y="345" text-anchor="middle" class="text">PTE: PPN[53:10] + V/R/W/X/U/G/A/D/COW</text>
  <text x="245" y="367" text-anchor="middle" class="text">刷新：sfence.vma</text>

  <rect x="495" y="270" width="360" height="105" class="la"/>
  <text x="675" y="299" text-anchor="middle" class="head">LoongArch LA64 三级页表</text>
  <text x="675" y="323" text-anchor="middle" class="mono">token = root_ppn &lt;&lt; 12</text>
  <text x="675" y="345" text-anchor="middle" class="text">PTE: V/D/PLV/MAT/P/W/COW/NR/NX</text>
  <text x="675" y="367" text-anchor="middle" class="text">刷新：flush_tlb + tlb_refill.S</text>

  <rect x="210" y="410" width="500" height="58" class="warn"/>
  <text x="460" y="435" text-anchor="middle" class="head">共享高半区内核映射</text>
  <text x="460" y="457" text-anchor="middle" class="text">from_kernel() 复制 KERNEL_BASE 以上根页表项，用户地址空间共享内核映射</text>

  <path d="M460 132 L460 165" class="arrow"/>
  <path d="M390 227 C330 247 280 250 245 270" class="arrow"/>
  <path d="M530 227 C590 247 640 250 675 270" class="arrow"/>
  <path d="M245 375 C290 405 355 408 410 410" class="arrow"/>
  <path d="M675 375 C630 405 565 408 510 410" class="arrow"/>
</svg>
