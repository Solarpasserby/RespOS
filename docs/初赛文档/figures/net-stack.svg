<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360">
  <defs>
    <style>
      .box { fill: #f8fafc; stroke: #64748b; stroke-width: 1.4; rx: 8; }
      .api { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.5; rx: 8; }
      .tcp { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; rx: 8; }
      .udp { fill: #ecfdf5; stroke: #16a34a; stroke-width: 1.5; rx: 8; }
      .dev { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; rx: 8; }
      .text { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #1f2937; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #475569; }
      .arrow { stroke: #475569; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="35" y="40" width="160" height="68" class="api"/>
  <text x="115" y="70" text-anchor="middle" class="text">syscall/net.rs</text>
  <text x="115" y="90" text-anchor="middle" class="small">copy args, errno, sockaddr</text>

  <rect x="255" y="40" width="165" height="68" class="api"/>
  <text x="337" y="70" text-anchor="middle" class="text">Socket FileOp</text>
  <text x="337" y="90" text-anchor="middle" class="small">fd table integration</text>

  <rect x="500" y="20" width="150" height="62" class="tcp"/>
  <text x="575" y="50" text-anchor="middle" class="text">TcpSocket</text>
  <text x="575" y="70" text-anchor="middle" class="small">state + listen table</text>

  <rect x="500" y="105" width="150" height="62" class="udp"/>
  <text x="575" y="135" text-anchor="middle" class="text">UdpSocket</text>
  <text x="575" y="155" text-anchor="middle" class="small">datagram endpoint</text>

  <rect x="720" y="62" width="165" height="68" class="box"/>
  <text x="802" y="92" text-anchor="middle" class="text">smoltcp SocketSet</text>
  <text x="802" y="112" text-anchor="middle" class="small">TCP / UDP protocol state</text>

  <rect x="500" y="230" width="150" height="62" class="dev"/>
  <text x="575" y="260" text-anchor="middle" class="text">LoopbackDev</text>
  <text x="575" y="280" text-anchor="middle" class="small">queue + buffer pool</text>

  <rect x="720" y="230" width="165" height="62" class="dev"/>
  <text x="802" y="260" text-anchor="middle" class="text">Interface::poll</text>
  <text x="802" y="280" text-anchor="middle" class="small">drive local packets</text>

  <rect x="255" y="230" width="165" height="62" class="box"/>
  <text x="337" y="260" text-anchor="middle" class="text">block_on loop</text>
  <text x="337" y="280" text-anchor="middle" class="small">poll, try, yield, retry</text>

  <path d="M195 74 H255" class="arrow"/>
  <path d="M420 74 C455 74 460 51 500 51" class="arrow"/>
  <path d="M420 74 C455 74 460 136 500 136" class="arrow"/>
  <path d="M650 51 C685 51 690 96 720 96" class="arrow"/>
  <path d="M650 136 C685 136 690 96 720 96" class="arrow"/>
  <path d="M802 130 V230" class="arrow"/>
  <path d="M720 261 H650" class="arrow"/>
  <path d="M337 230 V108" class="arrow"/>
  <path d="M420 261 H500" class="arrow"/>
</svg>
