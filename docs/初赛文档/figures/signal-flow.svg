<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475467"/>
    </marker>
    <style>
      .box { fill:#f8fafc; stroke:#667085; stroke-width:1.4; rx:6; }
      .hot { fill:#fff7ed; stroke:#ea580c; stroke-width:1.5; rx:6; }
      .blue { fill:#eff6ff; stroke:#2563eb; stroke-width:1.5; rx:6; }
      .green { fill:#ecfdf3; stroke:#16a34a; stroke-width:1.5; rx:6; }
      .text { font-family: "DejaVu Sans Mono", "Microsoft YaHei", sans-serif; font-size:15px; fill:#344054; }
      .title { font-family: "DejaVu Sans Mono", "Microsoft YaHei", sans-serif; font-size:17px; font-weight:700; fill:#101828; }
      .note { font-family: "DejaVu Sans Mono", "Microsoft YaHei", sans-serif; font-size:13px; fill:#667085; }
      .line { stroke:#475467; stroke-width:1.8; fill:none; marker-end:url(#arrow); }
      .dash { stroke:#667085; stroke-width:1.5; stroke-dasharray:6 5; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>

  <rect x="40" y="45" width="180" height="74" class="hot"/>
  <text x="130" y="77" text-anchor="middle" class="title">signal source</text>
  <text x="130" y="101" text-anchor="middle" class="text">kill / tkill / trap</text>

  <rect x="285" y="45" width="190" height="74" class="blue"/>
  <text x="380" y="77" text-anchor="middle" class="title">SigInfo</text>
  <text x="380" y="101" text-anchor="middle" class="text">signo + si_code</text>

  <rect x="540" y="45" width="210" height="74" class="green"/>
  <text x="645" y="77" text-anchor="middle" class="title">Task SigPending</text>
  <text x="645" y="101" text-anchor="middle" class="text">pending + mask + info</text>

  <rect x="540" y="175" width="210" height="78" class="box"/>
  <text x="645" y="207" text-anchor="middle" class="title">trap return hook</text>
  <text x="645" y="232" text-anchor="middle" class="text">handle_signal()</text>

  <rect x="285" y="175" width="190" height="78" class="box"/>
  <text x="380" y="207" text-anchor="middle" class="title">SigAction</text>
  <text x="380" y="232" text-anchor="middle" class="text">DFL / IGN / handler</text>

  <rect x="40" y="175" width="180" height="78" class="box"/>
  <text x="130" y="207" text-anchor="middle" class="title">blocked wait</text>
  <text x="130" y="232" text-anchor="middle" class="text">EINTR or wake</text>

  <rect x="190" y="315" width="210" height="78" class="blue"/>
  <text x="295" y="347" text-anchor="middle" class="title">user stack frame</text>
  <text x="295" y="372" text-anchor="middle" class="text">SigFrame / SigRTFrame</text>

  <rect x="520" y="315" width="220" height="78" class="green"/>
  <text x="630" y="347" text-anchor="middle" class="title">user handler</text>
  <text x="630" y="372" text-anchor="middle" class="text">a0/a1/a2 + trampoline</text>

  <rect x="780" y="315" width="110" height="78" class="hot"/>
  <text x="835" y="347" text-anchor="middle" class="title">sigreturn</text>
  <text x="835" y="372" text-anchor="middle" class="text">restore ctx</text>

  <path d="M220 82 H285" class="line"/>
  <path d="M475 82 H540" class="line"/>
  <path d="M645 119 V175" class="line"/>
  <path d="M540 214 H475" class="line"/>
  <path d="M285 214 H220" class="dash"/>
  <path d="M555 253 C515 290 455 315 400 340" class="line"/>
  <path d="M400 354 H520" class="line"/>
  <path d="M740 354 H780" class="line"/>
  <path d="M835 315 C820 260 760 225 750 214" class="dash"/>

  <text x="455" y="25" text-anchor="middle" class="note">信号先进入任务未决集合；真正递送集中在 trap 返回用户态前完成。</text>
  <text x="455" y="414" text-anchor="middle" class="note">用户 handler 返回到 trampoline 后执行 sigreturn，内核恢复寄存器、PC 和旧信号掩码。</text>
</svg>
